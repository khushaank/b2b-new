name: Deploy Website

on:
  push:
    branches:
      - main

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate website
        run: node scripts/check-site.mjs

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: 118.139.182.215
          username: deploy@b2bindustrial.in
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /

      - name: Verify production
        run: curl --fail --location --retry 5 --retry-delay 5 https://b2bindustrial.in/ > /dev/null
